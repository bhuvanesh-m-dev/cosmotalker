<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CosmoTalker API</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script>
        (async function() {
            // Get query from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            // Function to output JSON
            function outputJSON(data) {
                document.body.innerHTML = '';
                document.body.style.margin = '0';
                document.body.style.padding = '20px';
                document.body.style.backgroundColor = '#0a0e27';
                document.body.style.fontFamily = 'monospace';
                document.body.style.color = '#e0e0e0';
                document.body.textContent = JSON.stringify(data, null, 2);
            }
            
            // Check if query exists
            if (!query) {
                outputJSON({
                    status: 'error',
                    message: 'Missing "q" parameter. Use: ?q=planet_name',
                    example: '/api/get/?q=mars'
                });
                return;
            }
            
            try {
                // Initialize Pyodide
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"
                });
                
                // Load required packages
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                
                // Install all dependencies that cosmotalker needs
                await micropip.install("requests");
                await micropip.install("pytz");
                await micropip.install("cosmotalker==2.62");
                
                // Mock tkinter and other GUI modules
                await pyodide.runPythonAsync(`
import sys
import types

# Mock GUI modules that cause errors in browser
sys.modules['tkinter'] = types.ModuleType('tkinter')
sys.modules['tkinter.messagebox'] = types.ModuleType('tkinter.messagebox')
sys.modules['tkinter.ttk'] = types.ModuleType('tkinter.ttk')
sys.modules['customtkinter'] = types.ModuleType('customtkinter')
                `);
                
                // Run cosmotalker.get() and return JSON
                const result = await pyodide.runPythonAsync(`
import json
import cosmotalker as ct

# Use only .get() function
try:
    data = ct.get(${JSON.stringify(query)})
    result = {
        "status": "success",
        "data": data,
        "query": ${JSON.stringify(query)},
        "version": "2.62"
    }
except Exception as e:
    result = {
        "status": "error",
        "message": str(e),
        "query": ${JSON.stringify(query)},
        "version": "2.62"
    }

json.dumps(result)
                `);
                
                outputJSON(JSON.parse(result));
                
            } catch (error) {
                outputJSON({
                    status: 'error',
                    message: error.message,
                    query: query,
                    version: "2.62"
                });
            }
        })();
    </script>
</head>
<body></body>
</html>
