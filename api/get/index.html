<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CosmoTalker API - Text Output</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <style>
        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .loading-console {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto 20px;
        }
        .loading-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .loading-line.info { color: #60a5fa; }
        .loading-line.success { color: #10b981; }
        .loading-line.warning { color: #f59e0b; }
        .loading-line.error { color: #ef4444; }
        .loading-line.system { color: #a78bfa; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 24px;
            border-left: 4px solid #10b981;
            max-width: 800px;
            margin: 20px auto 0;
        }
        .result-header {
            font-weight: bold;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
            color: #10b981;
            font-size: 14px;
        }
        .answer-text {
            line-height: 1.8;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .answer-text p {
            margin: 12px 0;
        }
        .error-box {
            border-left-color: #ef4444;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    
    <script>
        let pyodide = null;
        let isReady = false;
        let outputDiv = null;
        
        function log(message, type = 'info') {
            if (outputDiv) {
                const line = document.createElement('div');
                line.className = `loading-line ${type}`;
                
                if (type === 'info' && (message.includes('Loading') || message.includes('Initializing'))) {
                    line.innerHTML = `<span class="spinner"></span> ${message}`;
                } else {
                    line.textContent = message;
                }
                
                outputDiv.appendChild(line);
                line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            console.log(`[${type}]`, message);
        }
        
        async function initCosmoTalker() {
            if (isReady && pyodide) return pyodide;
            
            outputDiv = document.getElementById('output');
            if (!outputDiv) {
                outputDiv = document.createElement('div');
                outputDiv.className = 'loading-console';
                document.body.appendChild(outputDiv);
            }
            
            log('🌌 Initializing GalacticCode Engine...', 'system');
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
            
            try {
                log('📦 Loading Pyodide...', 'info');
                const loadStart = performance.now();
                
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/",
                    stdout: () => {},
                    stderr: () => {}
                });
                
                const loadTime = ((performance.now() - loadStart) / 1000).toFixed(2);
                log(`✅ Pyodide loaded in ${loadTime}s`, 'success');
                
                log('🔧 Setting up Python environment...', 'info');
                
                pyodide.runPython(`
import sys
import io

class OutputCapture:
    def __init__(self):
        self.buffer = io.StringIO()
    
    def write(self, text):
        if text:
            self.buffer.write(text)
    
    def get_output(self):
        return self.buffer.getvalue()
    
    def clear(self):
        self.buffer = io.StringIO()

_capture = OutputCapture()
sys.stdout = _capture
sys.stderr = _capture

def get_captured():
    return _capture.get_output()

def clear_capture():
    _capture.clear()
                `);
                
                log('📦 Loading micropip...', 'info');
                await pyodide.loadPackage("micropip");
                log('✅ micropip ready', 'success');
                
                const micropip = pyodide.pyimport("micropip");
                
                log('🚀 Installing CosmoTalker v2.62...', 'info');
                const installStart = performance.now();
                
                await micropip.install("cosmotalker==2.62");
                await micropip.install(["cosmodb", "requests", "pytz"]);
                
                const installTime = ((performance.now() - installStart) / 1000).toFixed(2);
                log(`✅ CosmoTalker v2.62 installed in ${installTime}s`, 'success');
                
                log('🔧 Configuring CosmoTalker...', 'info');
                pyodide.runPython(`
import sys
import types

# Mock tkinter
for mod in ['tkinter', 'tkinter.messagebox', 'tkinter.ttk', 'customtkinter']:
    sys.modules[mod] = types.ModuleType(mod)

import cosmotalker as ct

# Disable image preview
class DummyImg:
    def __call__(self, *args, **kwargs):
        return None

ct.img = DummyImg()

print("✨ CosmoTalker v2.62 ready!")
print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                `);
                
                log('🎉 Ready!', 'success');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                isReady = true;
                return pyodide;
                
            } catch (error) {
                log(`❌ Failed: ${error.message}`, 'error');
                throw error;
            }
        }
        
        async function executeQuery(question) {
            const startTime = performance.now();
            
            try {
                await initCosmoTalker();
                pyodide.runPython(`clear_capture()`);
                
                log(`🔭 Query: "${question}"`, 'system');
                
                // Execute cosmotalker.get() and format output nicely
                const pythonCode = `
import cosmotalker as ct

print()
print("=" * 50)
print(f"📡 COSMOTALKER RESPONSE")
print("=" * 50)
print()

try:
    result = ct.get(${JSON.stringify(question)})
    
    if result:
        # If result is a string, print it directly
        if isinstance(result, str):
            print(result)
        # If result is a dictionary, format it nicely
        elif isinstance(result, dict):
            # Remove duplicate keys and format
            seen = set()
            for key, value in result.items():
                if key not in seen and value and str(value).strip():
                    seen.add(key)
                    # Format the key nicely
                    key_display = key.replace('_', ' ').title()
                    print(f"• {key_display}: {value}")
        # If result has __dict__ attribute
        elif hasattr(result, '__dict__'):
            for key, value in result.__dict__.items():
                if value and str(value).strip() and not key.startswith('_'):
                    key_display = key.replace('_', ' ').title()
                    print(f"• {key_display}: {value}")
        else:
            print(str(result))
    else:
        print(f"No information found for: ${JSON.stringify(question)}")
        print()
        print("💡 Try asking about:")
        print("   • Planets (earth, mars, jupiter)")
        print("   • ISS location")
        print("   • SpaceX missions")
        print("   • Fun facts")
        
except Exception as e:
    print(f"Error: {str(e)}")
    print()
    print("💡 Try these queries:")
    print("   • earth")
    print("   • mars")
    print("   • jupiter")
    print("   • iss location")
    print("   • spacex")

print()
print("=" * 50)
print(f"✨ Query completed")
print("=" * 50)
                `;
                
                log('🚀 Calling cosmotalker.get()...', 'info');
                
                await pyodide.runPythonAsync(pythonCode);
                
                const output = pyodide.runPython(`get_captured()`);
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                
                log(`✅ Query completed in ${executionTime}s`, 'success');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                return {
                    success: true,
                    query: question,
                    answer: output,
                    execution_time: parseFloat(executionTime),
                    timestamp: new Date().toISOString(),
                    method: "cosmotalker.get()",
                    version: "2.62"
                };
                
            } catch (error) {
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                log(`❌ Error: ${error.message}`, 'error');
                
                return {
                    success: false,
                    query: question,
                    answer: `Error: ${error.message}`,
                    execution_time: parseFloat(executionTime),
                    timestamp: new Date().toISOString(),
                    method: "cosmotalker.get()",
                    version: "2.62"
                };
            }
        }
        
        async function handleRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            let question = urlParams.get('q') || urlParams.get('query') || urlParams.get('question');
            
            if (!question) {
                await initCosmoTalker();
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                log('💡 Usage: ?q=your question', 'info');
                log('📝 Examples:', 'info');
                log('   • ?q=earth', 'info');
                log('   • ?q=mars', 'info');
                log('   • ?q=jupiter', 'info');
                log('   • ?q=iss location', 'info');
                log('   • ?q=spacex', 'info');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                const errorResponse = {
                    success: false,
                    error: "Missing 'q' parameter",
                    examples: ["?q=earth", "?q=mars", "?q=jupiter", "?q=iss location", "?q=spacex"],
                    timestamp: new Date().toISOString()
                };
                
                renderTextAnswer(errorResponse.error, errorResponse);
                return;
            }
            
            try {
                question = decodeURIComponent(question);
            } catch(e) {}
            
            const result = await executeQuery(question);
            renderTextAnswer(result.answer, result);
        }
        
        function renderTextAnswer(answer, metadata) {
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-box ${!metadata.success ? 'error-box' : ''}`;
            
            // Convert answer to readable paragraphs
            let formattedAnswer = answer
                .replace(/\n/g, '<br>')
                .replace(/•/g, '<span style="color: #a78bfa;">•</span>')
                .replace(/=/g, '<span style="color: #334155;">─</span>');
            
            resultDiv.innerHTML = `
                <div class="result-header">
                    📡 CosmoTalker Response
                    ${metadata.execution_time ? `<span style="float: right; font-size: 11px;">⚡ ${metadata.execution_time}s</span>` : ''}
                </div>
                <div class="answer-text">
                    ${formattedAnswer}
                </div>
            `;
            
            document.body.appendChild(resultDiv);
        }
        
        handleRequest();
    </script>
</body>
</html>
