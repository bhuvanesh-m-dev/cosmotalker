<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoTalker API</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script>
        // API Handler - Converts Python CosmoTalker calls to JSON
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            if (!query) {
                sendErrorResponse('Missing "q" parameter. Usage: ?q=planet_name');
                return;
            }

            // Initialize Pyodide
            let pyodide = await loadPyodide({
                indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/",
                stdout: (text) => console.log('[Python]', text),
                stderr: (text) => console.error('[Python Error]', text)
            });

            // Setup Python environment
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            
            // Install CosmoTalker
            await micropip.install(["cosmodb", "cosmotalker==2.62"]);
            
            // Mock GUI modules
            await pyodide.runPythonAsync(`
import sys
import types
import json

# Mock tkinter for browser
sys.modules['tkinter'] = types.ModuleType('tkinter')
sys.modules['tkinter.messagebox'] = types.ModuleType('tkinter.messagebox')
sys.modules['tkinter.ttk'] = types.ModuleType('tkinter.ttk')
sys.modules['customtkinter'] = types.ModuleType('customtkinter')

import cosmotalker as ct

class CosmoAPI:
    @staticmethod
    def get_data(query):
        """Universal getter that returns JSON-serializable data"""
        try:
            # Try planet info first
            if hasattr(ct, 'planet_info'):
                result = ct.planet_info(query)
                if result:
                    return {"status": "success", "data": result, "query": query}
            
            # Try search function
            if hasattr(ct, 'search'):
                result = ct.search(query)
                if result:
                    return {"status": "success", "data": result, "query": query}
            
            # Try direct get method
            if hasattr(ct, 'get'):
                result = ct.get(query)
                if result:
                    return {"status": "success", "data": result, "query": query}
            
            return {"status": "error", "message": f"No data found for '{query}'", "query": query}
        
        except Exception as e:
            return {"status": "error", "message": str(e), "query": query}
            `);

            // Execute query and capture result
            try {
                const result = await pyodide.runPythonAsync(`
import json
api = CosmoAPI()
result = api.get_data(${JSON.stringify(query)})
json.dumps(result, default=str)
`);
                sendJsonResponse(result);
            } catch (err) {
                sendErrorResponse(`Execution error: ${err.message}`);
            }
        })();

        function sendJsonResponse(data) {
            // Set CORS headers and content type
            const response = { status: "success", data: data };
            document.body.innerHTML = `<pre>${JSON.stringify(response, null, 2)}</pre>`;
        }

        function sendErrorResponse(message) {
            const error = { status: "error", message: message };
            document.body.innerHTML = `<pre>${JSON.stringify(error, null, 2)}</pre>`;
        }
    </script>
    <style>
        body { 
            font-family: monospace; 
            padding: 20px; 
            background: #0a0e27; 
            color: #e0e0e0;
            margin: 0;
        }
        pre { 
            background: #1a1f3a; 
            padding: 15px; 
            border-radius: 8px;
            overflow-x: auto;
            border-left: 3px solid #a855f7;
        }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 40px;">
        <h2>🌌 CosmoTalker API</h2>
        <p>Loading cosmic data...</p>
    </div>
</body>
</html>
