<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CosmoTalker API - Unified .get() Endpoint</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <style>
        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .loading-console {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto 20px;
        }
        .loading-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .loading-line.info { color: #60a5fa; }
        .loading-line.success { color: #10b981; }
        .loading-line.warning { color: #f59e0b; }
        .loading-line.error { color: #ef4444; }
        .loading-line.system { color: #a78bfa; }
        .loading-line.stdout { color: #e2e8f0; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #10b981;
            max-width: 800px;
            margin: 20px auto 0;
        }
        .result-header {
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
            color: #10b981;
        }
        .error-header {
            border-left-color: #ef4444;
        }
        .error-header .result-header {
            color: #ef4444;
        }
        .json-response {
            background: #1e293b;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    
    <script>
        // CosmoTalker API v2.62 - Uses ONLY .get() function
        // No version attribute check - just works
        
        let pyodide = null;
        let isReady = false;
        let outputDiv = null;
        
        function log(message, type = 'info') {
            if (outputDiv) {
                const line = document.createElement('div');
                line.className = `loading-line ${type}`;
                
                if (type === 'info' && (message.includes('Loading') || message.includes('Initializing'))) {
                    line.innerHTML = `<span class="spinner"></span> ${message}`;
                } else {
                    line.textContent = message;
                }
                
                outputDiv.appendChild(line);
                line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            console.log(`[${type}]`, message);
        }
        
        async function initCosmoTalker() {
            if (isReady && pyodide) return pyodide;
            
            outputDiv = document.getElementById('output');
            if (!outputDiv) {
                outputDiv = document.createElement('div');
                outputDiv.className = 'loading-console';
                document.body.appendChild(outputDiv);
            }
            
            log('🌌 Initializing GalacticCode Engine...', 'system');
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
            
            try {
                // Step 1: Load Pyodide
                log('📦 Loading Pyodide (Python WebAssembly)...', 'info');
                const loadStart = performance.now();
                
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/",
                    stdout: (text) => {
                        if (text && !text.includes('Loading ') && !text.includes('Loaded ')) {
                            log(`[CosmoTalker] ${text}`, 'stdout');
                        }
                    },
                    stderr: (text) => {
                        if (text && !text.includes('Loading ')) {
                            log(`[Error] ${text}`, 'error');
                        }
                    }
                });
                
                const loadTime = ((performance.now() - loadStart) / 1000).toFixed(2);
                log(`✅ Pyodide loaded in ${loadTime}s`, 'success');
                
                // Step 2: Setup Python output capture
                log('🔧 Setting up Python environment...', 'info');
                pyodide.runPython(`
import sys
import io

class OutputCapture:
    def __init__(self):
        self.buffer = io.StringIO()
    
    def write(self, text):
        if text and text.strip():
            self.buffer.write(text)
    
    def get_output(self):
        return self.buffer.getvalue()
    
    def clear(self):
        self.buffer = io.StringIO()

_capture = OutputCapture()
sys.stdout = _capture
sys.stderr = _capture

def get_captured():
    return _capture.get_output()

def clear_capture():
    _capture.clear()
                `);
                
                // Step 3: Install micropip
                log('📦 Loading micropip package manager...', 'info');
                await pyodide.loadPackage("micropip");
                log('✅ micropip ready', 'success');
                
                const micropip = pyodide.pyimport("micropip");
                
                // Step 4: Install CosmoTalker v2.62 only
                log('🚀 Installing CosmoTalker v2.62...', 'info');
                log('   📦 cosmotalker==2.62', 'info');
                log('   📦 cosmodb (dependency)', 'info');
                log('   📦 requests (dependency)', 'info');
                log('   📦 pytz (dependency)', 'info');
                
                const installStart = performance.now();
                
                // Install exact version 2.62
                await micropip.install("cosmotalker==2.62");
                await micropip.install(["cosmodb", "requests", "pytz"]);
                
                const installTime = ((performance.now() - installStart) / 1000).toFixed(2);
                log(`✅ CosmoTalker v2.62 installed in ${installTime}s`, 'success');
                
                // Step 5: Configure CosmoTalker (no version check)
                log('🔧 Configuring CosmoTalker for browser...', 'info');
                pyodide.runPython(`
import sys
import types

# Mock tkinter modules (not available in browser)
for mod in ['tkinter', 'tkinter.messagebox', 'tkinter.ttk', 'customtkinter']:
    sys.modules[mod] = types.ModuleType(mod)

# Import CosmoTalker
import cosmotalker as ct

# Disable image preview (not supported in browser)
class DummyImg:
    def __call__(self, *args, **kwargs):
        return "⚠️ Image preview not available in web version"

ct.img = DummyImg()

print("✨ CosmoTalker v2.62 is ready!")
print("🌌 Unified .get() function loaded")
print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                `);
                
                log('🎉 CosmoTalker initialization complete!', 'success');
                log('✨ Ready to answer space questions using .get()', 'success');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                isReady = true;
                return pyodide;
                
            } catch (error) {
                log(`❌ Initialization failed: ${error.message}`, 'error');
                throw error;
            }
        }
        
        async function executeQuery(question) {
            const startTime = performance.now();
            
            try {
                await initCosmoTalker();
                
                // Clear previous output
                pyodide.runPython(`clear_capture()`);
                
                log(`🔭 Processing: "${question}"`, 'system');
                
                // Use ONLY cosmotalker.get() - no version check
                const pythonCode = `
import cosmotalker as ct

print("🔍 Querying CosmoTalker database...")
print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")

try:
    # Use the unified get() function
    result = ct.get(${JSON.stringify(question)})
    
    if result and str(result).strip():
        print("✅ Answer from CosmoTalker:")
        print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
        print(result)
    else:
        print("⚠️ No information found for:", ${JSON.stringify(question)})
        print("💡 Try these examples:")
        print("   • earth")
        print("   • mars")
        print("   • iss location")
        print("   • spacex")
        print("   • black hole")
        
except Exception as e:
    print(f"❌ Error: {str(e)}")
    print("💡 CosmoTalker .get() works with queries like:")
    print("   • planet names (earth, mars, jupiter)")
    print("   • 'iss location'")
    print("   • 'spacex'")
    print("   • 'fun fact'")
                `;
                
                log('🚀 Calling cosmotalker.get()...', 'info');
                
                // Execute with timeout
                const executionPromise = pyodide.runPythonAsync(pythonCode);
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error("Timeout (30s)")), 30000);
                });
                
                await Promise.race([executionPromise, timeoutPromise]);
                
                // Get captured output
                let output = pyodide.runPython(`get_captured()`);
                output = output.trim();
                
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                
                if (output && output.length > 0 && !output.includes('No information found')) {
                    log(`✅ Query completed in ${executionTime}s`, 'success');
                    log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                    
                    return {
                        success: true,
                        query: question,
                        result: output,
                        execution_time: parseFloat(executionTime),
                        timestamp: new Date().toISOString(),
                        method: "cosmotalker.get()",
                        version: "2.62"
                    };
                } else {
                    log(`⚠️ No results for "${question}"`, 'warning');
                    
                    return {
                        success: false,
                        query: question,
                        result: null,
                        error: "No information found. Try: earth, mars, iss location, spacex, fun fact",
                        execution_time: parseFloat(executionTime),
                        timestamp: new Date().toISOString(),
                        method: "cosmotalker.get()",
                        version: "2.62"
                    };
                }
                
            } catch (error) {
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                log(`❌ Error: ${error.message}`, 'error');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                return {
                    success: false,
                    query: question,
                    result: null,
                    error: error.message,
                    execution_time: parseFloat(executionTime),
                    timestamp: new Date().toISOString(),
                    method: "cosmotalker.get()",
                    version: "2.62"
                };
            }
        }
        
        async function handleRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            let question = urlParams.get('q') || urlParams.get('query') || urlParams.get('question');
            
            if (!question) {
                await initCosmoTalker();
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                log('💡 Usage: Add ?q=your question to the URL', 'info');
                log('📝 Examples:', 'info');
                log('   • ?q=earth', 'info');
                log('   • ?q=mars', 'info');
                log('   • ?q=iss location', 'info');
                log('   • ?q=spacex', 'info');
                log('   • ?q=fun fact', 'info');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                const errorResponse = {
                    success: false,
                    error: "Missing 'q' parameter",
                    message: "Please provide a question using the 'q' parameter",
                    examples: ["?q=earth", "?q=mars", "?q=iss location", "?q=spacex", "?q=fun fact"],
                    timestamp: new Date().toISOString()
                };
                
                renderJSON(errorResponse, false);
                return;
            }
            
            try {
                question = decodeURIComponent(question);
            } catch(e) {}
            
            const result = await executeQuery(question);
            renderJSON(result, result.success);
        }
        
        function renderJSON(data, isSuccess = true) {
            const jsonString = JSON.stringify(data, null, 2);
            
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-box ${!isSuccess ? 'error-header' : ''}`;
            resultDiv.innerHTML = `
                <div class="result-header">
                    ${isSuccess ? '✅ API Response (JSON)' : '⚠️ API Response (JSON)'}
                </div>
                <div class="json-response">
                    <pre>${escapeHtml(jsonString)}</pre>
                </div>
            `;
            
            document.body.appendChild(resultDiv);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Start
        handleRequest();
    </script>
</body>
</html>
