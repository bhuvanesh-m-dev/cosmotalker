<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CosmoTalker JSON API</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script>
        // COSMOTALKER PURE JSON API
        // Uses only cosmotalker.get() function
        // Usage: /api/get/?q=mars
        
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            function sendJSON(data) {
                document.body.innerHTML = '';
                document.body.style.margin = '0';
                document.body.style.padding = '0';
                document.body.style.backgroundColor = '#0a0e27';
                
                const pre = document.createElement('pre');
                pre.style.margin = '0';
                pre.style.padding = '20px';
                pre.style.fontFamily = 'monospace';
                pre.style.fontSize = '14px';
                pre.style.color = '#e0e0e0';
                pre.style.backgroundColor = '#1a1f3a';
                pre.style.minHeight = '100vh';
                pre.style.overflow = 'auto';
                pre.textContent = JSON.stringify(data, null, 2);
                document.body.appendChild(pre);
            }
            
            if (!query || query.trim() === '') {
                sendJSON({
                    status: 'error',
                    message: 'Missing "q" parameter. Usage: ?q=planet_name',
                    example: '/api/get/?q=jupiter',
                    timestamp: new Date().toISOString()
                });
                return;
            }
            
            try {
                // Initialize Pyodide
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/",
                    stdout: () => {},
                    stderr: () => {}
                });
                
                // Load micropip
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                
                // Install CosmoTalker
                await micropip.install("cosmotalker");
                
                // Setup Python and execute query using only .get()
                await pyodide.runPythonAsync(`
import sys
import types
import json

# Mock tkinter for browser
sys.modules['tkinter'] = types.ModuleType('tkinter')
sys.modules['customtkinter'] = types.ModuleType('customtkinter')

# Import CosmoTalker
import cosmotalker as ct

def get_data(query):
    """Get data using cosmotalker.get()"""
    try:
        result = ct.get(query)
        return {
            'status': 'success',
            'data': result,
            'query': query,
            'timestamp': __import__('datetime').datetime.now().isoformat()
        }
    except Exception as e:
        return {
            'status': 'error',
            'message': str(e),
            'query': query,
            'timestamp': __import__('datetime').datetime.now().isoformat()
        }
                `);
                
                // Execute the query
                const result = await pyodide.runPythonAsync(`
import json
result = get_data(${JSON.stringify(query)})
json.dumps(result)
                `);
                
                sendJSON(JSON.parse(result));
                
            } catch (error) {
                sendJSON({
                    status: 'error',
                    message: error.message,
                    query: query,
                    timestamp: new Date().toISOString()
                });
            }
        })();
    </script>
</head>
<body></body>
</html>
