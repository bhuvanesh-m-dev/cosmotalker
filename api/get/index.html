<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CosmoTalker API - Structured JSON Output</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <style>
        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .loading-console {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto 20px;
        }
        .loading-line {
            margin: 4px 0;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .loading-line.info { color: #60a5fa; }
        .loading-line.success { color: #10b981; }
        .loading-line.warning { color: #f59e0b; }
        .loading-line.error { color: #ef4444; }
        .loading-line.system { color: #a78bfa; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #10b981;
            max-width: 900px;
            margin: 20px auto 0;
        }
        .result-header {
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
            color: #10b981;
        }
        .json-response {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.5;
        }
        .key {
            color: #c084fc;
        }
        .string {
            color: #10b981;
        }
        .number {
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    
    <script>
        let pyodide = null;
        let isReady = false;
        let outputDiv = null;
        
        function log(message, type = 'info') {
            if (outputDiv) {
                const line = document.createElement('div');
                line.className = `loading-line ${type}`;
                
                if (type === 'info' && (message.includes('Loading') || message.includes('Initializing'))) {
                    line.innerHTML = `<span class="spinner"></span> ${message}`;
                } else {
                    line.textContent = message;
                }
                
                outputDiv.appendChild(line);
                line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            console.log(`[${type}]`, message);
        }
        
        async function initCosmoTalker() {
            if (isReady && pyodide) return pyodide;
            
            outputDiv = document.getElementById('output');
            if (!outputDiv) {
                outputDiv = document.createElement('div');
                outputDiv.className = 'loading-console';
                document.body.appendChild(outputDiv);
            }
            
            log('🌌 Initializing GalacticCode Engine...', 'system');
            log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
            
            try {
                log('📦 Loading Pyodide...', 'info');
                const loadStart = performance.now();
                
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/",
                    stdout: () => {},
                    stderr: () => {}
                });
                
                const loadTime = ((performance.now() - loadStart) / 1000).toFixed(2);
                log(`✅ Pyodide loaded in ${loadTime}s`, 'success');
                
                log('🔧 Setting up Python environment...', 'info');
                
                // Setup output capture and JSON formatter
                pyodide.runPython(`
import sys
import io
import json

class OutputCapture:
    def __init__(self):
        self.buffer = io.StringIO()
    
    def write(self, text):
        if text and text.strip():
            self.buffer.write(text)
    
    def get_output(self):
        return self.buffer.getvalue()
    
    def clear(self):
        self.buffer = io.StringIO()

_capture = OutputCapture()
sys.stdout = _capture
sys.stderr = _capture

def get_captured():
    return _capture.get_output()

def clear_capture():
    _capture.clear()

def format_result(data):
    """Convert Python objects to clean JSON"""
    if data is None:
        return None
    if isinstance(data, (str, int, float, bool)):
        return data
    if isinstance(data, (dict, list)):
        return data
    try:
        return json.loads(json.dumps(data, default=str))
    except:
        return str(data)
                `);
                
                log('📦 Loading micropip...', 'info');
                await pyodide.loadPackage("micropip");
                log('✅ micropip ready', 'success');
                
                const micropip = pyodide.pyimport("micropip");
                
                log('🚀 Installing CosmoTalker v2.62...', 'info');
                const installStart = performance.now();
                
                await micropip.install("cosmotalker==2.62");
                await micropip.install(["cosmodb", "requests", "pytz"]);
                
                const installTime = ((performance.now() - installStart) / 1000).toFixed(2);
                log(`✅ CosmoTalker v2.62 installed in ${installTime}s`, 'success');
                
                log('🔧 Configuring CosmoTalker...', 'info');
                pyodide.runPython(`
import sys
import types

# Mock tkinter
for mod in ['tkinter', 'tkinter.messagebox', 'tkinter.ttk', 'customtkinter']:
    sys.modules[mod] = types.ModuleType(mod)

import cosmotalker as ct

# Disable image preview
class DummyImg:
    def __call__(self, *args, **kwargs):
        return None

ct.img = DummyImg()

print("✨ CosmoTalker v2.62 ready!")
print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                `);
                
                log('🎉 Ready!', 'success');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                isReady = true;
                return pyodide;
                
            } catch (error) {
                log(`❌ Failed: ${error.message}`, 'error');
                throw error;
            }
        }
        
        async function executeQuery(question) {
            const startTime = performance.now();
            
            try {
                await initCosmoTalker();
                pyodide.runPython(`clear_capture()`);
                
                log(`🔭 Query: "${question}"`, 'system');
                
                // Execute and get structured data
                const pythonCode = `
import cosmotalker as ct
import json

try:
    result = ct.get(${JSON.stringify(question)})
    
    # Format the result as clean JSON
    if result is not None:
        # Convert result to serializable format
        if hasattr(result, '__dict__'):
            output = result.__dict__
        elif isinstance(result, dict):
            output = result
        elif isinstance(result, (list, tuple)):
            output = [str(item) for item in result]
        else:
            output = str(result)
        
        # Print as JSON for parsing
        print("__START_RESULT__")
        print(json.dumps(output, default=str, indent=2))
        print("__END_RESULT__")
    else:
        print("__START_RESULT__")
        print(json.dumps({"error": "No information found", "query": ${JSON.stringify(question)}}, indent=2))
        print("__END_RESULT__")
        
except Exception as e:
    print("__START_RESULT__")
    print(json.dumps({"error": str(e), "query": ${JSON.stringify(question)}}, indent=2))
    print("__END_RESULT__")
                `;
                
                log('🚀 Calling cosmotalker.get()...', 'info');
                
                await pyodide.runPythonAsync(pythonCode);
                
                // Parse the result
                const output = pyodide.runPython(`get_captured()`);
                
                // Extract JSON between markers
                let resultData = null;
                const startMarker = '__START_RESULT__';
                const endMarker = '__END_RESULT__';
                
                const startIdx = output.indexOf(startMarker);
                const endIdx = output.indexOf(endMarker);
                
                if (startIdx !== -1 && endIdx !== -1) {
                    const jsonStr = output.substring(startIdx + startMarker.length, endIdx).trim();
                    try {
                        resultData = JSON.parse(jsonStr);
                    } catch (e) {
                        resultData = { raw: jsonStr };
                    }
                }
                
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                
                if (resultData && !resultData.error) {
                    log(`✅ Query completed in ${executionTime}s`, 'success');
                    
                    // Clean up the result - remove duplicate/unnecessary fields
                    if (resultData.CosmoTalker) {
                        resultData = resultData.CosmoTalker;
                    }
                    
                    // Remove duplicate fields
                    const cleanData = {};
                    const seen = new Set();
                    for (const [key, value] of Object.entries(resultData)) {
                        if (!seen.has(key) && value !== null && value !== undefined) {
                            cleanData[key] = value;
                            seen.add(key);
                        }
                    }
                    
                    return {
                        success: true,
                        query: question,
                        result: cleanData,
                        execution_time: parseFloat(executionTime),
                        timestamp: new Date().toISOString(),
                        method: "cosmotalker.get()",
                        version: "2.62"
                    };
                } else {
                    return {
                        success: false,
                        query: question,
                        result: null,
                        error: resultData?.error || "No information found",
                        execution_time: parseFloat(executionTime),
                        timestamp: new Date().toISOString(),
                        method: "cosmotalker.get()",
                        version: "2.62"
                    };
                }
                
            } catch (error) {
                const executionTime = ((performance.now() - startTime) / 1000).toFixed(3);
                log(`❌ Error: ${error.message}`, 'error');
                
                return {
                    success: false,
                    query: question,
                    result: null,
                    error: error.message,
                    execution_time: parseFloat(executionTime),
                    timestamp: new Date().toISOString(),
                    method: "cosmotalker.get()",
                    version: "2.62"
                };
            }
        }
        
        async function handleRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            let question = urlParams.get('q') || urlParams.get('query') || urlParams.get('question');
            
            if (!question) {
                await initCosmoTalker();
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                log('💡 Usage: ?q=your question', 'info');
                log('📝 Examples:', 'info');
                log('   • ?q=earth', 'info');
                log('   • ?q=mars', 'info');
                log('   • ?q=jupiter', 'info');
                log('   • ?q=iss location', 'info');
                log('   • ?q=spacex', 'info');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'system');
                
                renderJSON({
                    success: false,
                    error: "Missing 'q' parameter",
                    examples: ["?q=earth", "?q=mars", "?q=jupiter", "?q=iss location", "?q=spacex"],
                    timestamp: new Date().toISOString()
                });
                return;
            }
            
            try {
                question = decodeURIComponent(question);
            } catch(e) {}
            
            const result = await executeQuery(question);
            renderJSON(result);
        }
        
        function renderJSON(data) {
            const jsonString = JSON.stringify(data, null, 2);
            
            // Syntax highlight JSON
            const highlighted = jsonString
                .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
                .replace(/: "([^"]*)"/g, ': <span class="string">"$1"</span>')
                .replace(/: (\d+\.?\d*)/g, ': <span class="number">$1</span>');
            
            const resultDiv = document.createElement('div');
            resultDiv.className = `result-box`;
            resultDiv.innerHTML = `
                <div class="result-header">
                    ${data.success ? '✅ API Response (Structured JSON)' : '⚠️ API Response'}
                </div>
                <div class="json-response">
                    <pre>${highlighted}</pre>
                </div>
            `;
            
            document.body.appendChild(resultDiv);
        }
        
        handleRequest();
    </script>
</body>
</html>
