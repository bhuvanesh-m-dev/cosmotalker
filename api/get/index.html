<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoTalker API - High Performance</title>
    <style>
        body { 
            font-family: 'JetBrains Mono', monospace; 
            padding: 20px; 
            background: #0a0e27; 
            color: #e0e0e0;
            margin: 0;
        }
        pre { 
            background: #1a1f3a; 
            padding: 15px; 
            border-radius: 8px;
            overflow-x: auto;
            border-left: 3px solid #a855f7;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            background: #1a1f3a;
            border: 1px solid #a855f7;
        }
    </style>
</head>
<body>
    <div class="status" id="status">🌌 Initializing...</div>
    <div style="text-align: center; padding: 40px;">
        <h2>🚀 CosmoTalker High-Performance API</h2>
        <p>Powered by Web Worker + Pyodide</p>
        <pre id="output">Loading cosmic engine...</pre>
    </div>

    <script>
        let worker = null;
        let requestId = 0;
        const pendingRequests = new Map();

        async function initWorker() {
            worker = new Worker('worker.js');
            
            worker.onmessage = function(event) {
                const { id, type, result, message, status } = event.data;
                
                if (type === 'status') {
                    updateStatus(status, message);
                } else if (type === 'response' && pendingRequests.has(id)) {
                    const { resolve } = pendingRequests.get(id);
                    pendingRequests.delete(id);
                    resolve(result);
                } else if (type === 'error') {
                    console.error('Worker error:', message);
                    updateStatus('error', message);
                }
            };
            
            // Wait for worker to be ready
            return new Promise((resolve) => {
                const checkReady = (event) => {
                    if (event.data.type === 'status' && event.data.ready) {
                        worker.removeEventListener('message', checkReady);
                        resolve();
                    }
                };
                worker.addEventListener('message', checkReady);
            });
        }

        function updateStatus(status, message) {
            const statusEl = document.getElementById('status');
            const icons = {
                initializing: '🌌',
                loading_packages: '📦',
                installing: '🔧',
                configuring: '⚙️',
                ready: '✅',
                error: '❌'
            };
            statusEl.innerHTML = `${icons[status] || '🔄'} ${message || status}`;
        }

        async function apiRequest(type, payload) {
            if (!worker) {
                await initWorker();
            }
            
            const id = requestId++;
            return new Promise((resolve) => {
                pendingRequests.set(id, { resolve });
                worker.postMessage({ id, type, payload });
            });
        }

        // Main API handler for URL queries
        (async function() {
            await initWorker();
            
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const method = urlParams.get('method') || 'auto';
            
            if (!query) {
                const error = {
                    status: 'error',
                    message: 'Missing "q" parameter. Usage: ?q=mars&method=auto',
                    example: '/api/get/?q=jupiter',
                    available_methods: ['auto', 'planet_info', 'search', 'get', 'fun_fact']
                };
                document.getElementById('output').innerHTML = JSON.stringify(error, null, 2);
                return;
            }
            
            updateStatus('querying', `Searching for "${query}"...`);
            
            const result = await apiRequest('query', { query, method });
            document.getElementById('output').innerHTML = JSON.stringify(result, null, 2);
            
            if (result.status === 'success') {
                updateStatus('ready', `✓ Data retrieved for "${query}"`);
            } else {
                updateStatus('error', result.message);
            }
        })();
    </script>
</body>
</html>
