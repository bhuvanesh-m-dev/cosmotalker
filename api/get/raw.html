<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            
            function sendJSON(data) {
                // Send raw JSON without ANY HTML
                document.write(JSON.stringify(data, null, 2));
                document.close();
            }
            
            if (!query) {
                sendJSON({
                    status: 'error',
                    message: 'Missing "q" parameter'
                });
                return;
            }
            
            try {
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"
                });
                
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                await micropip.install("requests");
                await micropip.install("pytz");
                await micropip.install("cosmotalker==2.62");
                
                await pyodide.runPythonAsync(`
import sys
import types
sys.modules['tkinter'] = types.ModuleType('tkinter')
sys.modules['customtkinter'] = types.ModuleType('customtkinter')
                `);
                
                const result = await pyodide.runPythonAsync(`
import json
import cosmotalker as ct
data = ct.get(${JSON.stringify(query)})
json.dumps({"status": "success", "data": data, "query": ${JSON.stringify(query)}})
                `);
                
                sendJSON(JSON.parse(result));
                
            } catch (error) {
                sendJSON({
                    status: 'error',
                    message: error.message,
                    query: query
                });
            }
        })();
    </script>
</head>
<body></body>
</html>
