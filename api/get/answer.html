<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Answer - CosmoTalker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .answer-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .question-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .question-badge span:first-child {
            opacity: 0.7;
        }

        .question-badge strong {
            color: #ffd700;
            margin-left: 10px;
        }

        .answer-box {
            background: #0a0e1a;
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
            font-size: 1.1em;
        }

        .answer-box pre {
            background: #00000030;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            margin: 10px 0;
        }

        .meta {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8em;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        .error {
            color: #ff6b6b;
            background: #ff000020;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @media (max-width: 600px) {
            .answer-wrapper {
                padding: 20px;
            }
            .answer-box {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="answer-wrapper" id="answerWrapper">
        <div class="loading">🌌 Loading answer from CosmoTalker...</div>
    </div>
    <script>
        // This page receives the question via URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const question = urlParams.get('q');
        
        if (!question) {
            document.getElementById('answerWrapper').innerHTML = `
                <div class="answer-wrapper">
                    <div class="error">❌ No question provided. Use ?q=your question</div>
                    <div class="meta">Example: answer.html?q=planet earth</div>
                </div>
            `;
        } else {
            // Load answer using the same logic as main page
            loadAnswer();
        }
        
        async function loadAnswer() {
            // This will be populated by script.js
            window.currentQuestion = question;
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
